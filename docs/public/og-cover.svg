<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2f6fd0"/>
      <stop offset="50%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Parabola arc (projectile motion decoration) -->
  <path d="M 750 520 Q 950 180 1150 520" stroke="url(#accent)" stroke-width="3" fill="none" stroke-opacity="0.5"/>
  <!-- Ball on arc -->
  <circle cx="950" cy="180" r="10" fill="#06b6d4" opacity="0.8"/>
  <!-- Velocity arrow -->
  <line x1="950" y1="180" x2="1010" y2="220" stroke="white" stroke-width="2" opacity="0.6"/>
  <polygon points="1010,220 1000,205 1020,210" fill="white" opacity="0.6"/>

  <!-- Sine wave (left decoration) -->
  <path d="M 60 315 C 100 270 140 360 180 315 C 220 270 260 360 300 315 C 340 270 380 360 420 315"
        stroke="#8a5cf6" stroke-width="2.5" fill="none" opacity="0.5"/>

  <!-- Left accent bar -->
  <rect x="72" y="160" width="6" height="310" rx="3" fill="url(#accent)"/>

  <!-- Main heading -->
  <text x="110" y="240" font-family="system-ui, -apple-system, sans-serif"
        font-size="64" font-weight="800" fill="white" opacity="0.95">Physics Companion</text>

  <!-- Gradient underline -->
  <rect x="110" y="258" width="680" height="4" rx="2" fill="url(#accent)"/>

  <!-- Sub heading -->
  <text x="112" y="320" font-family="system-ui, -apple-system, sans-serif"
        font-size="34" font-weight="400" fill="#94a3b8">Class 11 · NCERT · Karnataka PU</text>

  <!-- Tag chips -->
  <rect x="112" y="360" width="130" height="38" rx="19" fill="#2f6fd0" fill-opacity="0.3" stroke="#2f6fd0" stroke-width="1.5"/>
  <text x="177" y="384" font-family="system-ui, sans-serif" font-size="18" fill="#93c5fd" text-anchor="middle">JEE Main</text>

  <rect x="258" y="360" width="170" height="38" rx="19" fill="#7c3aed" fill-opacity="0.3" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="343" y="384" font-family="system-ui, sans-serif" font-size="18" fill="#c4b5fd" text-anchor="middle">JEE Advanced</text>

  <rect x="444" y="360" width="100" height="38" rx="19" fill="#0891b2" fill-opacity="0.3" stroke="#0891b2" stroke-width="1.5"/>
  <text x="494" y="384" font-family="system-ui, sans-serif" font-size="18" fill="#67e8f9" text-anchor="middle">KCET</text>

  <rect x="560" y="360" width="190" height="38" rx="19" fill="#1f9d6b" fill-opacity="0.3" stroke="#1f9d6b" stroke-width="1.5"/>
  <text x="655" y="384" font-family="system-ui, sans-serif" font-size="18" fill="#6ee7b7" text-anchor="middle">Karnataka PU</text>

  <!-- Features row -->
  <text x="112" y="460" font-family="system-ui, sans-serif" font-size="22" fill="#64748b">
    💡 Concept first &nbsp;·&nbsp; 🎬 Live animations &nbsp;·&nbsp; ✅ Quick quizzes &nbsp;·&nbsp; 🌍 Real examples
  </text>

  <!-- Domain -->
  <text x="112" y="560" font-family="system-ui, monospace" font-size="22" fill="#475569">
    learn.kanaksan.com/11/physics
  </text>

  <!-- Chapter count badge -->
  <rect x="900" y="460" width="220" height="80" rx="16" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>
  <text x="1010" y="492" font-family="system-ui, sans-serif" font-size="36" font-weight="800" fill="white" text-anchor="middle">14</text>
  <text x="1010" y="520" font-family="system-ui, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">Chapters</text>
</svg>
